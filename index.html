<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convergence 5 - Jeu</title>
    <link rel="manifest" href="/manifest-index.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Convergence 5">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Écran d'accueil -->
    <div id="welcome-screen" class="screen active">
        <div class="welcome-container">
            <h1 class="welcome-title">Convergence 5</h1>
            <p class="welcome-tagline">5 thèmes. 1 équipe. 1 objectif.</p>
            <button id="playBtn" class="welcome-btn">Jouer</button>
        </div>
    </div>

    <!-- Écran de configuration des joueurs -->
    <div id="players-setup-screen" class="screen">
        <div class="setup-container">
            <h2>Configuration des joueurs</h2>
            <div id="players-list" class="players-list"></div>
            <div class="setup-actions">
                <button id="addPlayerBtn" class="setup-btn">+ Ajouter un joueur</button>
                <button id="startGameBtn" class="setup-btn setup-btn-primary">Commencer le jeu</button>
            </div>
        </div>
    </div>

    <!-- Écran de jeu -->
    <div id="game-screen" class="screen">
        <div class="top-bar">
            <div class="stats-left">
                <div class="lives-display-bar">
                    <span class="heart-icon">❤️</span>
                    <span id="lives">3</span>
                </div>
                <div class="energy-display-bar">
                    <span class="lightning-icon">⚡</span>
                    <span id="energy">3</span>
                </div>
                <div class="points-display-bar">
                    <span class="star-icon">⭐</span>
                    <span id="points">0</span>
                </div>
            </div>
            <div class="timer-right">
                <div class="timer-display" id="timer">04:00</div>
                <div class="timer-controls">
                    <button id="fullscreenBtn" class="timer-btn">Plein écran</button>
                    <button id="pauseBtn" class="timer-btn">Pause</button>
                    <button id="resumeBtn" class="timer-btn" style="display: none;">Reprendre</button>
                    <button id="resetBtn" class="timer-btn">Réinitialiser</button>
                </div>
            </div>
        </div>
        <div class="container">
            <div id="grid" class="grid"></div>
        </div>
        <button id="finishBtn" class="finish-btn">Fini</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }

        function requestFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const fsBtn = document.getElementById('fullscreenBtn');
            if (fsBtn) {
                fsBtn.addEventListener('click', requestFullscreen);
            }
        });
    </script>
    <script src="common.js"></script>
    <script src="setup.js"></script>
    <script src="player.js"></script>
</body>
</html>
