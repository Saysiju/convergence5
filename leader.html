<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convergence 5 - Meneur</title>
    <link rel="manifest" href="/manifest-leader.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Convergence 5">
    <link rel="stylesheet" href="game.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <!-- Écran de connexion -->
    <div id="join-screen" class="screen active">
        <div class="container">
            <h1>Convergence 5 - Meneur</h1>
            <button id="fullscreenBtn" class="btn btn-small">Plein écran</button>
            <div class="form-group">
                <label for="sessionCodeInput">Code de session :</label>
                <input type="text" id="sessionCodeInput" placeholder="Entrez le code" maxlength="7">
            </div>
            <div class="form-group">
                <label for="playerNameInput">Votre nom :</label>
                <input type="text" id="playerNameInput" placeholder="Votre nom">
            </div>
            <button id="joinBtn" class="btn btn-primary">Rejoindre</button>
            <div id="joinError" class="error-message"></div>
        </div>
    </div>

    <!-- Écran d'attente -->
    <div id="waiting-screen" class="screen">
        <div class="container">
            <h1>Vous êtes le meneur</h1>
            <p>En attente que le maître du jeu lance la partie...</p>
        </div>
    </div>

    <!-- Écran de jeu -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="stat">
                <span class="stat-label">Score :</span>
                <span id="gameScore" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Vies :</span>
                <span id="gameLives" class="stat-value">3</span>
            </div>
            <div class="stat">
                <span class="stat-label">Temps :</span>
                <span id="gameTimer" class="stat-value">4:00</span>
            </div>
        </div>
        <div id="grid-container" class="grid-container">
            <div id="grid" class="grid"></div>
        </div>
        <div id="cell-details" class="cell-details" style="display: none;">
            <h2 id="cellCategory"></h2>
            <p id="cellName" class="cell-name-hidden"></p>
            <button id="showPropositionsBtn" class="btn btn-primary">Afficher les propositions</button>
            <button id="passBtn" class="btn btn-secondary">Passe</button>
        </div>
    </div>

    <!-- Écran de fin de partie -->
    <div id="end-game-screen" class="screen">
        <div class="container">
            <h1 id="endGameTitle"></h1>
            <p id="endGameMessage"></p>
        </div>
    </div>

    <div id="gamePopup" class="game-popup-overlay">
        <div class="game-popup">
            <div id="popupIcon" class="game-popup-icon" style="display: none;"></div>
            <h2 id="popupTitle" class="game-popup-title" style="display: none;"></h2>
            <p id="popupMessage" class="game-popup-message"></p>
            <div id="popupScore" class="game-popup-score" style="display: none;"></div>
            <button id="popupBtn" class="game-popup-btn">OK</button>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }

        function requestFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const fsBtn = document.getElementById('fullscreenBtn');
            if (fsBtn) {
                fsBtn.addEventListener('click', requestFullscreen);
            }
        });
    </script>
    <script src="popup.js"></script>
    <script src="leader.js"></script>
</body>
</html>
