<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convergence 5 - Meneur</title>
    <link rel="manifest" href="/manifest-leader.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Convergence 5">
    <link rel="stylesheet" href="game.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="sounds.js"></script>
</head>
<body>
    <button id="fullscreenToggle" class="fullscreen-toggle" aria-label="Basculer en plein écran">
        ⛶ <span>Plein écran</span>
    </button>
    <!-- Écran de connexion -->
    <div id="join-screen" class="screen active">
        <div class="container">
            <h1>Convergence 5 - Meneur</h1>
            <div id="sessionStatus" class="session-info">
                En attente de la création de la partie...
            </div>
            <div class="form-group">
                <label for="playerNameInput">Votre nom :</label>
                <input type="text" id="playerNameInput" placeholder="Votre nom">
            </div>
            <button id="joinBtn" class="btn btn-primary" disabled>Rejoindre</button>
            <div id="joinError" class="error-message"></div>
        </div>
    </div>

    <!-- Écran d'attente -->
    <div id="waiting-screen" class="screen">
        <div class="container">
            <h1>Vous êtes le meneur</h1>
            <p>En attente que le maître du jeu lance la partie...</p>
        </div>
    </div>

    <!-- Écran de jeu -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="stat">
                <span class="stat-label">Score :</span>
                <span id="gameScore" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Vies :</span>
                <span id="gameLives" class="stat-value">5</span>
            </div>
            <div class="stat">
                <span class="stat-label">Temps :</span>
                <span id="gameTimer" class="stat-value">5:00</span>
            </div>
            <div class="stat">
                <span class="stat-label">Énergie :</span>
                <span id="gameEnergy" class="stat-value">5</span>
            </div>
        </div>
        <div id="grid-container" class="grid-container">
            <div id="grid" class="grid"></div>
        </div>
        <div id="cell-details" class="cell-details" style="display: none;">
            <h2 id="cellCategory"></h2>
            <p id="cellName" class="cell-name-hidden"></p>
            <button id="showPropositionsBtn" class="btn btn-primary">Afficher les propositions</button>
            <button id="passBtn" class="btn btn-secondary">Passe</button>
        </div>

        <!-- Phase 2 : question finale affichée chez le meneur si c'est lui qui répond -->
        <div id="final-question-overlay" class="final-question-overlay" style="display: none;">
            <div class="final-question-content">
                <h2>Question finale</h2>
                <p id="finalQuestionTheme" class="final-question-theme"></p>
                <p id="finalQuestionText" class="final-question-text"></p>
                <p class="final-question-timer">
                    Temps restant : <span id="finalQuestionTimer">60</span> s
                </p>
                <p class="final-question-instruction">
                    Répondez à haute voix, le maître du jeu validera votre réponse.
                </p>
            </div>
        </div>
    </div>

    <!-- Écran de fin de partie -->
    <div id="end-game-screen" class="screen">
        <div class="container">
            <h1 id="endGameTitle"></h1>
            <p id="endGameMessage"></p>
        </div>
    </div>

    <div id="gamePopup" class="game-popup-overlay">
        <div class="game-popup">
            <div id="popupIcon" class="game-popup-icon" style="display: none;"></div>
            <h2 id="popupTitle" class="game-popup-title" style="display: none;"></h2>
            <p id="popupMessage" class="game-popup-message"></p>
            <div id="popupScore" class="game-popup-score" style="display: none;"></div>
            <button id="popupBtn" class="game-popup-btn">OK</button>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }

        function isFullscreen() {
            return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
        }

        function updateFullscreenButton() {
            const btn = document.getElementById('fullscreenToggle');
            if (!btn) return;
            btn.style.display = isFullscreen() ? 'none' : 'inline-flex';
        }

        function requestFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('fullscreenToggle');
            if (btn) {
                btn.addEventListener('click', requestFullscreen);
            }
            updateFullscreenButton();
        });

        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('msfullscreenchange', updateFullscreenButton);
    </script>
    <script src="popup.js"></script>
    <script src="leader.js"></script>
</body>
</html>
